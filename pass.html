<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>天津大学校门管控系统</title>
  <style>
    /* ===== 全局重置 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      /* 与原站字体完全一致 */
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 顶部导航栏（白底，与微信内置浏览器导航一致）===== */
    .nav-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-bottom: 1px solid #e5e5e5;
    }
    .nav-bar .nav-back {
      position: absolute;
      left: 12px;
      font-size: 18px;
      color: #333;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 10px;
      line-height: 1;
    }
    .nav-bar .nav-title {
      font-size: 17px;
      font-weight: 600;
      color: #000;
      letter-spacing: 0;
    }

    /* ===== 蓝色主体背景（与原站色值吻合）===== */
    .page-bg {
      min-height: 100vh;
      background: #1a6fc4;   /* 原站蓝色，偏中性蓝 */
      padding-top: 44px;
      padding-bottom: 32px;
    }

    /* ===== 内容区 ===== */
    .content {
      padding: 12px 12px 0;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== 顶部浅蓝标签（附件1：大圆角，浅蓝底，蓝色字）===== */
    .tag-bar {
      background: #d6e8f7;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
    }
    .tag-bar span {
      font-size: 17px;
      color: #2b7cd3;
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ===== 通行证主卡片 ===== */
    .pass-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
    }

    /* ===== 更新时间行（附件1：浅灰字，有细分割线）===== */
    .update-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #ebebeb;
    }
    .update-bar span {
      font-size: 13px;
      color: #bbb;
      font-weight: 400;
    }

    /* ===== 上半部分：照片 + 时间 + 对勾 ===== */
    .card-top {
      display: flex;
      align-items: flex-start;
      padding: 16px 16px 8px;
      gap: 16px;
    }

    /* 证件照片：无圆角，尺寸与附件1一致（更大）*/
    /* ⚠️ 替换照片：改 src 即可 */
    .photo-img {
      width: 140px;
      min-width: 140px;
      height: 175px;
      object-fit: cover;
      object-position: center top;
      border-radius: 0;
      display: block;
      flex-shrink: 0;
    }

    /* 右侧：日期 + 时间 + 对勾，垂直居中 */
    .card-top-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 0;
      min-height: 175px;
    }

    /* 日期：比时间小一号，时间28px，日期22px */
    .date-text {
      font-size: 22px;
      color: #111;
      font-weight: 400;
      margin-bottom: 2px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    /* 时间整体容器 */
    .time-text {
      white-space: nowrap;
      line-height: 1.1;
      display: flex;
      align-items: baseline;
    }
    /* HH:MM: 黑色超粗体 */
    .time-hm {
      font-size: 28px;
      font-weight: 900;
      color: #000;
      letter-spacing: -1px;
    }
    /* SS 秒数 → 蓝色 */
    .time-s {
      font-size: 28px;
      font-weight: 900;
      color: #1565c0;
      letter-spacing: -1px;
    }
    /* .x 小数 → 红色 */
    .time-ms {
      font-size: 28px;
      font-weight: 900;
      color: #e53935;
      letter-spacing: -1px;
    }

    /* 绿色圆形对勾，附件1约80px */
    .check-circle {
      width: 80px;
      height: 80px;
      background: #3daf3e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
    }
    .check-circle svg {
      width: 46px;
      height: 46px;
    }

    /* ===== 允许通行：附件1红色，约34px，字间距0，紧凑 ===== */
    .allow-text {
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      color: #e53935;
      padding: 10px 0 16px;
      letter-spacing: 0;
    }

    /* ===== 信息列表 ===== */
    .info-list {
      border-top: 1px solid #e0e0e0;
    }
    .info-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid #e8e8e8;
      min-height: 44px;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    /* 标签：浅灰色 #aaa，14px，与附件1一致 */
    .info-label {
      font-size: 14px;
      color: #aaa;
      min-width: 68px;
      flex-shrink: 0;
      font-weight: 400;
      letter-spacing: 0;
    }
    /* 值：深黑 #111，14px，右对齐 */
    .info-value {
      font-size: 14px;
      color: #111;
      text-align: right;
      flex: 1;
      word-break: break-all;
      font-weight: 400;
      letter-spacing: 0;
    }
    /* 申请时间两行 */
    .info-value.multiline {
      text-align: right;
      line-height: 1.65;
    }
  </style>
</head>
<body>

<!-- 顶部导航栏 -->
<div class="nav-bar">
  <span class="nav-back" onclick="history.back()">&#x2715;</span>
  <span class="nav-title">天津大学校门管控系统</span>
</div>

<!-- 蓝色主体背景 -->
<div class="page-bg">
  <div class="content">

    <!-- 顶部浅蓝标签 -->
    <div class="tag-bar">
      <span>第三方服务人员进出校</span>
    </div>

    <!-- 通行证主卡片 -->
    <div class="pass-card">

      <!-- 更新时间行 -->
      <div class="update-bar">
        <span>更新于：<span id="update-time">--</span></span>
      </div>

      <!-- 上半部分：照片 + 日期时间 + 对勾 -->
      <div class="card-top">

        <!-- 证件照片 -->
        <!-- ⚠️ 替换照片：修改 src 路径即可 -->
        <img class="photo-img" src="ME1781257067499.png" alt="证件照片" />

        <!-- 右侧：日期 + 时间 + 对勾 -->
        <div class="card-top-right">
          <!-- 页面打开时的日期 -->
          <div class="date-text" id="live-date">--</div>
          <!-- 时间：HH:MM: 黑色，SS 蓝色，.x 红色 -->
          <div class="time-text">
            <span class="time-hm" id="live-hm">--:--:</span><span class="time-s" id="live-s">--</span><span class="time-ms">.<span id="live-ms">-</span></span>
          </div>
          <!-- 绿色对勾 -->
          <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="20,6 9,17 4,12" stroke="#fff" stroke-width="3.2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- 允许通行 -->
      <div class="allow-text">允许通行</div>

      <!-- 信息列表 -->
      <div class="info-list">

        <div class="info-row">
          <span class="info-label">姓名：</span>
          <span class="info-value" id="info-name">--</span>
        </div>

        <div class="info-row">
          <span class="info-label">身份证号：</span>
          <span class="info-value" id="info-idcard">--</span>
        </div>

        <div class="info-row">
          <span class="info-label">申请时间：</span>
          <span class="info-value multiline" id="info-apply-time">--</span>
        </div>

        <div class="info-row">
          <span class="info-label">职务：</span>
          <span class="info-value" id="info-duty"></span>
        </div>

        <div class="info-row">
          <span class="info-label">单位：</span>
          <span class="info-value" id="info-dept">--</span>
        </div>

        <div class="info-row">
          <span class="info-label">通行方式：</span>
          <span class="info-value">机动车</span>
        </div>

        <div class="info-row">
          <span class="info-label">车牌号：</span>
          <span class="info-value" id="info-plate">--</span>
        </div>

      </div>
    </div><!-- /.pass-card -->

  </div><!-- /.content -->
</div><!-- /.page-bg -->

<script>
  // ===== 1. 读取 URL 参数填充信息 =====
  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key) || '';
  }

  const name       = getParam('name');
  const idcard     = getParam('idcard');
  const dept       = getParam('dept');
  const plate      = getParam('plate');
  const applyTime  = getParam('applyTime');
  const updateTime = getParam('updateTime');

  document.getElementById('info-name').textContent   = name;
  document.getElementById('info-idcard').textContent = idcard;
  document.getElementById('info-dept').textContent   = dept;
  document.getElementById('info-plate').textContent  = plate;
  document.getElementById('update-time').textContent = updateTime;

  // 申请时间拆两行：日期 + 时间
  const applyParts = applyTime.split(' ');
  if (applyParts.length === 2) {
    document.getElementById('info-apply-time').innerHTML =
      applyParts[0] + '<br>' + applyParts[1];
  } else {
    document.getElementById('info-apply-time').textContent = applyTime;
  }

  // ===== 2. 页面打开瞬间抓取时间，固定显示，不走秒 =====
  function pad(n) { return String(n).padStart(2, '0'); }

  (function renderOpenTime() {
    const now = new Date();
    const y = now.getFullYear();
    const M = pad(now.getMonth() + 1);
    const d = pad(now.getDate());
    document.getElementById('live-date').textContent = `${y}年${M}月${d}日`;

    const h  = pad(now.getHours());
    const m  = pad(now.getMinutes());
    const s  = pad(now.getSeconds());
    document.getElementById('live-hm').textContent = `${h}:${m}:`;
    document.getElementById('live-s').textContent  = s;

    // 毫秒第1位（0-9）
    const ms1 = Math.floor(now.getMilliseconds() / 100);
    document.getElementById('live-ms').textContent = ms1;
  })();

  // ===== 3. 无参数时跳回首页 =====
  if (!name && !idcard) {
    setTimeout(function() { window.location.href = 'index.html'; }, 500);
  }
</script>
</body>
</html>
